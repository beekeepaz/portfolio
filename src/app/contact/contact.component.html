<section>
    <div>
        <h2>Contact me</h2>
        <h1>Let's work<br>
            together
        </h1>
        <h2>Got a problem to solve</h2>
        <p>Contact me through this form, I am interestd in hearing from you,
            knowing your ideas and contributing to your projects with my work.
        </p>
        <div>
            <p>Need a Frontend developer?</p>
            <p>Let's talk!</p>
        </div>
    </div>
    <div>
        <form class="kontaktformular" onsubmit="sendMail(event)">
            <div class="longe-line"></div>
            <label>
                <input class="name" type="name" name="name" placeholder="What's your name?"
                    onSubmit="return is_value()" required>
            </label>
            <div class="longe-line"></div>
            <label>
                <input class="namemail" type="email" name="email" placeholder="What's your email?"
                    onSubmit="return is_value()" required>
            </label>
            <div class="longe-line"></div>
            <label>
                <textarea class="nachricht" name="message" placeholder="How can I help you?"
                    onSubmit="return is_value()" required></textarea>
            </label>
            <div class="longe-line"></div>
            <button class="button" type="submit">Nachricht senden</button>
        </form>
    </div>
</section>
<app-footer></app-footer>
